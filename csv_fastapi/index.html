<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>

    <!-- 🔥 Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
        }
        .card {
            border-radius: 15px;
        }
        pre {
            background: black;
            color: #00ffcc;
            padding: 15px;
            border-radius: 10px;
            max-height: 400px;
            overflow: auto;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <div class="card p-4 shadow-lg">
        <h2 class="text-center text-dark mb-4">🎓 Student Data Dashboard</h2>

        <!-- Form -->
        <form id="studentForm" class="row g-3">
            <div class="col-md-8">
                <input type="number" id="limit" class="form-control" placeholder="Enter number of students" required>
            </div>
            <div class="col-md-4">
                <button class="btn btn-primary w-100">Get Data</button>
            </div>
        </form>

        <hr>

        <!-- Buttons -->
        <div class="d-flex gap-2 mb-3">
            <button class="btn btn-success" onclick="getAll()">Get All Data</button>
            <button class="btn btn-warning" onclick="clearData()">Clear</button>
        </div>

        <!-- Output -->
        <h5 class="text-dark">Result:</h5>
        <pre id="output">No data yet...</pre>

    </div>

</div>

<script>
    const form = document.getElementById("studentForm");

    // Get limited data
    form.addEventListener("submit", async function(e) {
        e.preventDefault();

        const limit = document.getElementById("limit").value;

        const response = await fetch(`/students/${limit}`);
        const data = await response.json();

        document.getElementById("output").textContent = JSON.stringify(data, null, 2);
    });

    // Get all data
    async function getAll() {
        const response = await fetch(`/students`);
        const data = await response.json();

        document.getElementById("output").textContent = JSON.stringify(data, null, 2);
    }

    // Clear output
    function clearData() {
        document.getElementById("output").textContent = "No data yet...";
    }
</script>

</body>
</html>
